name: Electron safeStorage probe

on:
  pull_request:
    paths:
      - .nvmrc
      - .github/workflows/electron-safe-storage-probe.yml
      - tools/electron-safe-storage-probe/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  packaged-safe-storage:
    name: Packaged safeStorage (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            label: macOS x64
          - os: windows-2022
            label: Windows x64

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tools/electron-safe-storage-probe/package-lock.json

      - name: Install probe dependencies without lifecycle scripts
        run: npm ci --prefix tools/electron-safe-storage-probe --ignore-scripts

      - name: Fetch and verify the pinned Electron archive
        run: npm --prefix tools/electron-safe-storage-probe run fetch:electron

      - name: Package the synthetic x64 application
        run: npm --prefix tools/electron-safe-storage-probe run package:probe

      - name: Prepare a disposable macOS Keychain
        if: runner.os == 'macOS'
        run: npm --prefix tools/electron-safe-storage-probe run keychain:prepare

      - name: Verify packaged safeStorage relaunch and failures
        run: npm --prefix tools/electron-safe-storage-probe run probe:packaged

      - name: Diagnose a rejected Windows package launch
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageRoot = Join-Path $PWD 'tools/electron-safe-storage-probe/out/Constellation Key Custody Probe-win32-x64'
          $executable = Join-Path $packageRoot 'Constellation Key Custody Probe.exe'
          if (-not (Test-Path -LiteralPath $executable -PathType Leaf)) {
            throw 'WINDOWS_PACKAGE_MISSING'
          }

          $file = Get-Item -LiteralPath $executable
          $signature = (Get-AuthenticodeSignature -LiteralPath $executable).Status
          $zone = [bool](Get-Item -LiteralPath $executable -Stream Zone.Identifier -ErrorAction SilentlyContinue)
          Write-Output "WINDOWS_PACKAGE_STATE:signature=$signature;zone=$zone;bytes=$($file.Length)"

          $start = [System.Diagnostics.ProcessStartInfo]::new()
          $start.FileName = $executable
          $start.UseShellExecute = $false
          $start.RedirectStandardOutput = $true
          $start.RedirectStandardError = $true
          $start.ArgumentList.Add('--version')
          $process = [System.Diagnostics.Process]::new()
          $process.StartInfo = $start
          try {
            [void]$process.Start()
          } catch {
            $nativeCode = $_.Exception.InnerException.NativeErrorCode
            throw "WINDOWS_PACKAGE_START_FAILED:$nativeCode"
          }
          if (-not $process.WaitForExit(10000)) {
            $process.Kill($true)
            throw 'WINDOWS_PACKAGE_START_TIMEOUT'
          }
          $stdout = $process.StandardOutput.ReadToEnd().Trim()
          $stderr = $process.StandardError.ReadToEnd().Trim()
          Write-Output "WINDOWS_PACKAGE_EXIT:code=$($process.ExitCode);stdout=$stdout;stderr=$stderr"

      - name: Restore the macOS Keychain configuration
        if: always() && runner.os == 'macOS'
        run: npm --prefix tools/electron-safe-storage-probe run keychain:restore

      - name: Audit the isolated dependency graph
        run: npm audit --prefix tools/electron-safe-storage-probe --audit-level=high

      - name: Remove package and runtime state
        if: always()
        run: npm --prefix tools/electron-safe-storage-probe run cleanup
