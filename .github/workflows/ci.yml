name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run repository checks
        run: npm run check

      - name: Audit dependency graph
        if: matrix.os == 'ubuntu-latest'
        run: npm run audit:dependencies

  hub:
    name: Self-hosted Hub and PostgreSQL
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18.1-alpine
        env:
          POSTGRES_DB: constellation
          POSTGRES_USER: constellation
          POSTGRES_PASSWORD: constellation-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U constellation"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install and build
        run: npm ci --ignore-scripts && npm run build

      - name: Verify PostgreSQL restart, attachments, and HTTP ranges
        env:
          HUB_TEST_DATABASE_URL: postgres://constellation:constellation-ci@127.0.0.1:5432/constellation
        run: node --test packages/hub/dist/test/*.test.js

      - name: Drill PostgreSQL backup and restore into an empty database
        shell: bash
        run: |
          export PGPASSWORD=constellation-ci
          docker run --rm --network host -e PGPASSWORD postgres:18.1-alpine \
            pg_dump -h 127.0.0.1 -U constellation -Fc constellation > "$RUNNER_TEMP/hub.pgdump"
          docker run --rm --network host -e PGPASSWORD postgres:18.1-alpine \
            psql -h 127.0.0.1 -U constellation -d postgres -v ON_ERROR_STOP=1 \
            -c 'DROP DATABASE IF EXISTS constellation_restore' \
            -c 'CREATE DATABASE constellation_restore'
          docker run --rm --network host -i -e PGPASSWORD postgres:18.1-alpine \
            pg_restore -h 127.0.0.1 -U constellation -d constellation_restore \
            --exit-on-error < "$RUNNER_TEMP/hub.pgdump"
          test "$(docker run --rm --network host -e PGPASSWORD postgres:18.1-alpine \
            psql -h 127.0.0.1 -U constellation -d constellation_restore -At \
            -c 'SELECT schema_version FROM constellation_hub_meta WHERE singleton = true')" = "1"

      - name: Build the operator Hub image from a clean context
        run: docker build -f deploy/hub/Dockerfile -t constellation-hub:ci .
