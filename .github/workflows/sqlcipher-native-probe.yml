name: SQLCipher native probe

on:
  pull_request:
    paths:
      - .nvmrc
      - .github/workflows/sqlcipher-native-probe.yml
      - tools/sqlcipher-native-probe/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  amalgamation:
    name: Generate pinned SQLCipher source
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install source-generation prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libssl-dev tcl-dev

      - name: Generate and identify the amalgamation
        run: bash tools/sqlcipher-native-probe/scripts/generate-amalgamation.sh "$RUNNER_TEMP/sqlcipher-amalgamation"

      - name: Upload the licensed source artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: sqlcipher-4.16.0-amalgamation
          path: ${{ runner.temp }}/sqlcipher-amalgamation
          if-no-files-found: error
          retention-days: 1

  macos-x64:
    name: Native probe (macOS x64)
    needs: amalgamation
    runs-on: macos-15-intel
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tools/sqlcipher-native-probe/package-lock.json

      - name: Download SQLCipher source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sqlcipher-4.16.0-amalgamation
          path: ${{ runner.temp }}/sqlcipher-amalgamation

      - name: Install probe dependencies without lifecycle scripts
        run: npm ci --prefix tools/sqlcipher-native-probe --ignore-scripts

      - name: Install the pinned Electron runtime
        run: node tools/sqlcipher-native-probe/node_modules/electron/install.js

      - name: Build the Electron native binding
        run: bash tools/sqlcipher-native-probe/scripts/build-macos.sh "$RUNNER_TEMP/sqlcipher-amalgamation"

      - name: Run encrypted-store assertions
        run: npm --prefix tools/sqlcipher-native-probe run probe

      - name: Audit the isolated dependency graph
        run: npm audit --prefix tools/sqlcipher-native-probe --audit-level=high

  windows-x64:
    name: Native probe (Windows x64)
    needs: amalgamation
    runs-on: windows-2022
    timeout-minutes: 50

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tools/sqlcipher-native-probe/package-lock.json

      - name: Download SQLCipher source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sqlcipher-4.16.0-amalgamation
          path: ${{ runner.temp }}/sqlcipher-amalgamation

      - name: Install probe dependencies without lifecycle scripts
        run: npm ci --prefix tools/sqlcipher-native-probe --ignore-scripts

      - name: Install the pinned Electron runtime
        run: node tools/sqlcipher-native-probe/node_modules/electron/install.js

      - name: Build OpenSSL and the Electron native binding
        shell: pwsh
        run: ./tools/sqlcipher-native-probe/scripts/build-windows.ps1 -Amalgamation "$env:RUNNER_TEMP\sqlcipher-amalgamation"

      - name: Run encrypted-store assertions
        run: npm --prefix tools/sqlcipher-native-probe run probe

      - name: Audit the isolated dependency graph
        run: npm audit --prefix tools/sqlcipher-native-probe --audit-level=high
