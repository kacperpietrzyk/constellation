name: Packaged encrypted store probe

on:
  pull_request:
    paths:
      - .nvmrc
      - .github/workflows/packaged-encrypted-store-probe.yml
      - tools/packaged-encrypted-store-probe/**
      - tools/sqlcipher-native-probe/scripts/build-macos.sh
      - tools/sqlcipher-native-probe/scripts/build-windows.ps1
      - tools/sqlcipher-native-probe/scripts/generate-amalgamation.sh
      - tools/sqlcipher-native-probe/scripts/patch-binding.mjs
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  amalgamation:
    name: Generate pinned SQLCipher source
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install source-generation prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libssl-dev tcl-dev

      - name: Generate and identify the amalgamation
        run: bash tools/sqlcipher-native-probe/scripts/generate-amalgamation.sh "$RUNNER_TEMP/sqlcipher-amalgamation"

      - name: Upload the licensed source artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: packaged-store-sqlcipher-4.16.0-amalgamation
          path: ${{ runner.temp }}/sqlcipher-amalgamation
          if-no-files-found: error
          retention-days: 1

  macos-x64:
    name: Packaged encrypted store (macOS x64)
    needs: amalgamation
    runs-on: macos-15-intel
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tools/packaged-encrypted-store-probe/package-lock.json

      - name: Download SQLCipher source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packaged-store-sqlcipher-4.16.0-amalgamation
          path: ${{ runner.temp }}/sqlcipher-amalgamation

      - name: Install probe dependencies without lifecycle scripts
        run: npm ci --prefix tools/packaged-encrypted-store-probe --ignore-scripts

      - name: Verify interruption cleanup scope
        run: npm --prefix tools/packaged-encrypted-store-probe run test:cleanup

      - name: Verify recovery fixture semantics
        run: npm --prefix tools/packaged-encrypted-store-probe run test:recovery-fixtures

      - name: Verify generation publication fixture semantics
        run: npm --prefix tools/packaged-encrypted-store-probe run test:generation-recovery-fixtures

      - name: Verify process harness semantics
        run: npm --prefix tools/packaged-encrypted-store-probe run test:process-harness

      - name: Verify POSIX process identity semantics
        run: npm --prefix tools/packaged-encrypted-store-probe run test:posix-process-tree

      - name: Build the Electron native binding
        run: bash tools/sqlcipher-native-probe/scripts/build-macos.sh "$RUNNER_TEMP/sqlcipher-amalgamation" "$PWD/tools/packaged-encrypted-store-probe"

      - name: Fetch and verify the pinned Electron archive
        run: npm --prefix tools/packaged-encrypted-store-probe run fetch:electron

      - name: Package the synthetic x64 application
        run: npm --prefix tools/packaged-encrypted-store-probe run package:probe

      - name: Prepare a disposable macOS Keychain
        run: npm --prefix tools/packaged-encrypted-store-probe run keychain:prepare

      - name: Verify packaged encrypted-store relaunch
        run: npm --prefix tools/packaged-encrypted-store-probe run probe:packaged

      - name: Verify packaged forced-crash recovery
        run: npm --prefix tools/packaged-encrypted-store-probe run probe:recovery

      - name: Verify packaged generation publication recovery
        run: npm --prefix tools/packaged-encrypted-store-probe run probe:generation-recovery

      - name: Restore the macOS Keychain configuration
        if: always()
        run: npm --prefix tools/packaged-encrypted-store-probe run keychain:restore

      - name: Audit the isolated dependency graph
        run: npm audit --prefix tools/packaged-encrypted-store-probe --audit-level=high

      - name: Remove package and runtime state
        if: always()
        run: npm --prefix tools/packaged-encrypted-store-probe run cleanup

  windows-x64:
    name: Packaged encrypted store (Windows x64)
    needs: amalgamation
    runs-on: windows-2022
    timeout-minutes: 55

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tools/packaged-encrypted-store-probe/package-lock.json

      - name: Download SQLCipher source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packaged-store-sqlcipher-4.16.0-amalgamation
          path: ${{ runner.temp }}/sqlcipher-amalgamation

      - name: Install probe dependencies without lifecycle scripts
        run: npm ci --prefix tools/packaged-encrypted-store-probe --ignore-scripts

      - name: Verify interruption cleanup scope
        run: npm --prefix tools/packaged-encrypted-store-probe run test:cleanup

      - name: Verify recovery fixture semantics
        run: npm --prefix tools/packaged-encrypted-store-probe run test:recovery-fixtures

      - name: Verify generation publication fixture semantics
        run: npm --prefix tools/packaged-encrypted-store-probe run test:generation-recovery-fixtures

      - name: Verify process harness semantics
        run: npm --prefix tools/packaged-encrypted-store-probe run test:process-harness

      - name: Verify POSIX process identity semantics
        run: npm --prefix tools/packaged-encrypted-store-probe run test:posix-process-tree

      - name: Build OpenSSL and the Electron native binding
        shell: pwsh
        run: ./tools/sqlcipher-native-probe/scripts/build-windows.ps1 -Amalgamation "$env:RUNNER_TEMP\sqlcipher-amalgamation" -TargetProbeRoot (Resolve-Path "tools/packaged-encrypted-store-probe").Path

      - name: Fetch and verify the pinned Electron archive
        run: npm --prefix tools/packaged-encrypted-store-probe run fetch:electron

      - name: Package the synthetic x64 application
        run: npm --prefix tools/packaged-encrypted-store-probe run package:probe

      - name: Verify packaged encrypted-store relaunch
        run: npm --prefix tools/packaged-encrypted-store-probe run probe:packaged

      - name: Verify packaged forced-crash recovery
        run: npm --prefix tools/packaged-encrypted-store-probe run probe:recovery

      - name: Verify packaged generation publication recovery
        run: npm --prefix tools/packaged-encrypted-store-probe run probe:generation-recovery

      - name: Audit the isolated dependency graph
        run: npm audit --prefix tools/packaged-encrypted-store-probe --audit-level=high

      - name: Remove package and runtime state
        if: always()
        run: npm --prefix tools/packaged-encrypted-store-probe run cleanup
