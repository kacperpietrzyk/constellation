name: Signed desktop release candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact semver release version
        required: true
        type: string
      include_windows:
        description: Build a signed Windows release after credentials are provisioned
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  CONSTELLATION_PUBLIC_UPDATE_ORIGIN: https://github.com/kacperpietrzyk/constellation/releases/latest/download

concurrency:
  group: signed-desktop-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  amalgamation:
    name: Generate pinned SQLCipher source
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libssl-dev tcl-dev
      - run: bash scripts/native/generate-sqlcipher-amalgamation.sh "$RUNNER_TEMP/sqlcipher-amalgamation"
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: release-sqlcipher-4.16.0-amalgamation
          path: ${{ runner.temp }}/sqlcipher-amalgamation
          if-no-files-found: error
          retention-days: 1

  macos:
    name: Signed and notarized macOS (${{ matrix.architecture }})
    needs: amalgamation
    environment: desktop-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            architecture: arm64
          - os: macos-15-intel
            architecture: x64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-sqlcipher-4.16.0-amalgamation
          path: ${{ runner.temp }}/sqlcipher-amalgamation
      - run: npm ci --ignore-scripts
      - env:
          CONSTELLATION_ALPHA_ARCH: ${{ matrix.architecture }}
        run: bash scripts/native/build-sqlcipher-macos.sh "$RUNNER_TEMP/sqlcipher-amalgamation" "$PWD"
      - name: Materialize the notarization key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
      - name: Build, sign, notarize, staple, and verify
        env:
          CONSTELLATION_ALPHA_ARCH: ${{ matrix.architecture }}
          CONSTELLATION_RELEASE_VERSION: ${{ inputs.version }}
          CONSTELLATION_RELEASE_TIER: production-signed
          CONSTELLATION_UPDATE_ORIGIN: ${{ env.CONSTELLATION_PUBLIC_UPDATE_ORIGIN }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run package:distribution
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: constellation-${{ inputs.version }}-macos-${{ matrix.architecture }}
          path: |
            release/distribution/*.dmg
            release/distribution/*.zip
          if-no-files-found: error
          retention-days: 7

  windows:
    name: Signed Windows x64
    needs: amalgamation
    if: ${{ inputs.include_windows }}
    environment: desktop-release
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-sqlcipher-4.16.0-amalgamation
          path: ${{ runner.temp }}/sqlcipher-amalgamation
      - run: npm ci --ignore-scripts
      - shell: pwsh
        run: ./scripts/native/build-sqlcipher-windows.ps1 -Amalgamation "$env:RUNNER_TEMP\sqlcipher-amalgamation" -TargetRoot (Resolve-Path ".").Path
      - name: Build, sign, and verify
        env:
          CONSTELLATION_ALPHA_ARCH: x64
          CONSTELLATION_RELEASE_VERSION: ${{ inputs.version }}
          CONSTELLATION_RELEASE_TIER: production-signed
          CONSTELLATION_UPDATE_ORIGIN: ${{ env.CONSTELLATION_PUBLIC_UPDATE_ORIGIN }}
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: npm run package:distribution
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: constellation-${{ inputs.version }}-windows-x64
          path: release/distribution/*.exe
          if-no-files-found: error
          retention-days: 7

  draft-release:
    name: Prepare protected GitHub Release draft
    needs: [macos, windows]
    if: >-
      ${{ always() && needs.macos.result == 'success' &&
          (needs.windows.result == 'success' || needs.windows.result == 'skipped') }}
    environment: desktop-release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: constellation-${{ inputs.version }}-macos-*
          path: release-assets
          merge-multiple: true
      - if: ${{ inputs.include_windows }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: constellation-${{ inputs.version }}-windows-x64
          path: release-assets
      - name: Create architecture-aware update metadata
        shell: bash
        run: |
          args=(--directory release-assets --version "${{ inputs.version }}")
          if [[ "${{ inputs.include_windows }}" == "true" ]]; then
            args+=(--include-windows)
          fi
          node scripts/prepare-github-release.mjs "${args[@]}"
      - name: Refuse to replace an existing version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ inputs.version }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release v${{ inputs.version }} already exists; published versions are immutable." >&2
            exit 1
          fi
      - name: Create reviewable release draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" release-assets/* \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Constellation ${{ inputs.version }}" \
            --generate-notes \
            --draft
