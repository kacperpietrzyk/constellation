services:
  postgres:
    image: postgres:18.1-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: constellation
      POSTGRES_USER: constellation
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constellation"]
      interval: 10s
      timeout: 5s
      retries: 5
  hub:
    build:
      context: ../..
      dockerfile: deploy/hub/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      CONSTELLATION_HUB_DATABASE_URL_FILE: /run/secrets/database_url
      CONSTELLATION_HUB_STORAGE_ROOT: /var/lib/constellation/attachments
      CONSTELLATION_HUB_HOST: 0.0.0.0
      CONSTELLATION_HUB_PORT: 4318
      CONSTELLATION_HUB_TLS_CERT: /run/tls/tls.crt
      CONSTELLATION_HUB_TLS_KEY: /run/tls/tls.key
    secrets: [database_url]
    volumes:
      - attachment-data:/var/lib/constellation/attachments
      - ./tls:/run/tls:ro
    ports: ["4318:4318"]
secrets:
  postgres_password:
    file: ./secrets/postgres_password
  database_url:
    file: ./secrets/database_url
volumes:
  postgres-data:
  attachment-data:
